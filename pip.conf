# pip.conf — forces pip to use real PyPI regardless of what the system
# /etc/pip.conf points to (Oracle Cloud VMs redirect to an internal mirror
# frozen at ~late 2020, which doesn't have any packages released after that).
#
# This file is read by pip when placed at:
#   ~/.config/pip/pip.conf          (user-level, recommended)
#   /etc/pip.conf                   (system-level)
#   <venv>/pip.conf                 (venv-level — setup.sh copies it here)
#
# setup.sh copies this into the venv automatically. If you want it system-wide:
#   mkdir -p ~/.config/pip && cp pip.conf ~/.config/pip/pip.conf

[global]
index-url = https://pypi.org/simple/
trusted-host = pypi.org
               files.pythonhosted.org
